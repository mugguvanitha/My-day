<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;

  /* 🌸 YOUR IMAGE */
  background: url('assets/1777185695083.png') no-repeat center/cover;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* 🌫️ cinematic overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.6)
  );
}

/* 💖 content */
.content {
  position: relative;
  z-index: 2;
  padding: 20px;
}

/* 🎉 main heading */
h1 {
  font-size: 50px;
  color: #ff4b7d;

  text-shadow:
    0 0 10px rgba(255,75,125,0.9),
    0 0 20px rgba(255,75,125,0.7),
    0 0 40px rgba(255,75,125,0.5);

  animation: pop 1.5s ease;
}

/* 💌 sub text */
p {
  font-size: 20px;
  color: #ffffff;
  margin-top: 10px;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* ✨ pop animation */
@keyframes pop {
  0% { transform: scale(0.6); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* 🎊 confetti */
.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  opacity: 0.8;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10vh); }
  to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
  <h1>Happy Birthday Pichi 🎉</h1>
  <p>You make my world beautiful 💖</p>
</div>

<script>
// 🎉 Confetti animation
for (let i = 0; i < 80; i++) {
  let c = document.createElement("div");
  c.className = "confetti";

  c.style.left = Math.random() * 100 + "vw";
  c.style.animationDuration = (3 + Math.random() * 3) + "s";

  // soft aesthetic colors
  let colors = ["#ff4b7d","#ff8fa3","#ffc2d1","#ffffff"];
  c.style.background = colors[Math.floor(Math.random()*colors.length)];

  document.body.appendChild(c);
}
</script>

</body>
</html>
