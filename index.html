<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;

  /* your image */
  background: url('assets/1777185695083.png') no-repeat center/cover;
}

/* soft dark overlay (makes text visible) */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
}

/* top text container */
.content {
  position: absolute;
  top: 8%;
  width: 100%;
  text-align: center;
  z-index: 2;
}

/* main heading */
h1 {
  font-size: 42px;
  color: #ff6f91;
  margin: 0;

  /* soft glow */
  text-shadow: 0 0 10px rgba(255,111,145,0.6);

  animation: fadeIn 1.5s ease;
}

/* sub text */
p {
  font-size: 16px;
  color: #ffffff;
  margin-top: 6px;
  text-shadow: 0 0 6px rgba(0,0,0,0.6);

  animation: fadeIn 2s ease;
}

/* simple fade animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* floating hearts */
.heart {
  position: absolute;
  color: #ff6f91;
  font-size: 14px;
  animation: floatUp linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
  <h1>Happy Birthday Pichi 🎉</h1>
  <p>You make my world beautiful 💖</p>
</div>

<script>
// 💖 floating hearts
for (let i = 0; i < 30; i++) {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";

  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(h);
}
</script>

</body>
</html>
