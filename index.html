<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: url('assets/1777185695083.png') no-repeat center/cover;
}

/* overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
}

/* top text */
.content {
  position: absolute;
  top: 8%;
  width: 100%;
  text-align: center;
  z-index: 2;
}

h1 {
  font-size: 42px;
  color: #ff6f91;
}

p {
  color: white;
}
</style>
</head>

<body>

<!-- 🎵 AUDIO -->
<audio id="bgMusic" loop>
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<div class="overlay"></div>

<div class="content">
  <h1>Happy Birthday Pichi💖</h1>
</div>

<script>
let music = document.getElementById("bgMusic");

// 👇 Start from middle (change this value)
let startTime = 500; // seconds (you can change like 30, 50 etc)

document.addEventListener("click", function() {
  music.currentTime = startTime;
  music.play();
});
</script>

</body>
</html>
